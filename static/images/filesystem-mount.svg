<svg xmlns="http://www.w3.org/2000/svg" width="720" height="510" viewBox="0 0 720 510">
  <defs>
    <style>
      .title      { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .section    { font: 700 11px Arial, sans-serif; fill: #64748b; letter-spacing: 1px; }
      .label      { font: 600 13px Arial, sans-serif; fill: #0f172a; }
      .code       { font: 600 13px 'Courier New', monospace; fill: #1e293b; }
      .small      { font: 400 12px Arial, sans-serif; fill: #334155; }
      .note       { font: 400 12px Arial, sans-serif; fill: #64748b; }
      .highlight  { font: 600 12px Arial, sans-serif; fill: #1d4ed8; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="510" fill="#ffffff"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" class="title">Mounting a Filesystem</text>

  <!-- ── DIRECTORY HIERARCHY ── -->
  <text x="40" y="62" class="section">DIRECTORY HIERARCHY</text>

  <!-- / -->
  <rect x="300" y="70" width="120" height="38" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="360" y="94" text-anchor="middle" class="code">/</text>

  <!-- Trunk line down from / -->
  <line x1="360" y1="108" x2="360" y2="122" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Horizontal branch -->
  <line x1="130" y1="122" x2="590" y2="122" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Branch drops to /boot, /home, /mnt -->
  <line x1="130" y1="122" x2="130" y2="138" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="360" y1="122" x2="360" y2="138" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="590" y1="122" x2="590" y2="138" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- /boot -->
  <rect x="70" y="138" width="120" height="38" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="130" y="162" text-anchor="middle" class="code">/boot</text>

  <!-- /home -->
  <rect x="300" y="138" width="120" height="38" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="360" y="162" text-anchor="middle" class="code">/home</text>

  <!-- /mnt -->
  <rect x="530" y="138" width="120" height="38" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="590" y="162" text-anchor="middle" class="code">/mnt</text>

  <!-- Line from /mnt down to /mnt/data -->
  <line x1="590" y1="176" x2="590" y2="196" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- /mnt/data (mount point — highlighted) -->
  <rect x="510" y="196" width="160" height="46" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="590" y="217" text-anchor="middle" class="code">/mnt/data</text>
  <text x="590" y="234" text-anchor="middle" class="highlight">mount point</text>

  <!-- ── ARROW: mount point → partition ── -->
  <line x1="590" y1="242" x2="590" y2="318" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <rect x="502" y="266" width="100" height="20" rx="3" fill="#ffffff"/>
  <text x="552" y="280" text-anchor="middle" class="small">mounted at</text>

  <!-- ── PHYSICAL STORAGE ── -->
  <text x="40" y="338" class="section">PHYSICAL STORAGE</text>

  <!-- Hard drive outer rectangle -->
  <rect x="40" y="348" width="640" height="130" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="360" y="370" text-anchor="middle" class="label">/dev/sda  —  Hard Drive</text>

  <!-- sda1 -->
  <rect x="60" y="380" width="160" height="82" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="140" y="408" text-anchor="middle" class="code">/dev/sda1</text>
  <text x="140" y="426" text-anchor="middle" class="small">ext4</text>
  <text x="140" y="442" text-anchor="middle" class="small">500 MB · /boot</text>

  <!-- sda2 -->
  <rect x="240" y="380" width="200" height="82" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="340" y="408" text-anchor="middle" class="code">/dev/sda2</text>
  <text x="340" y="426" text-anchor="middle" class="small">ext4</text>
  <text x="340" y="442" text-anchor="middle" class="small">20 GB · /</text>

  <!-- sda3 (highlighted — this partition is mounted at /mnt/data) -->
  <rect x="460" y="380" width="200" height="82" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="560" y="408" text-anchor="middle" class="code">/dev/sda3</text>
  <text x="560" y="426" text-anchor="middle" class="small">ext4</text>
  <text x="560" y="442" text-anchor="middle" class="small">50 GB · unmounted</text>

  <!-- ── FOOTER NOTE ── -->
  <text x="360" y="496" text-anchor="middle" class="note">The filesystem (ext4) resides on the partition. Mounting attaches it to the directory hierarchy at the mount point.</text>
</svg>
