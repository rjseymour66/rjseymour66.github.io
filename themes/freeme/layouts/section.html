{{ define "main" }}
<aside class="sidebar">{{- partial "sidebar-nav" . -}}</aside>
<div class="content-wrapper index">
  <div class="content">
    <article class="content__inner">
      <h1>{{ .Title }}</h1>
      {{ with .Content }} {{ . }} {{ else }} {{ range $.Pages }}
      <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
      {{ end }} {{ end }}
    </article>
  </div>
  <aside class="content-toc">{{- partial "content-toc" . -}}</aside>
</div>

{{ end }}
